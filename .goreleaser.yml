# GoReleaser v2 — https://goreleaser.com
version: 2

project_name: vigil

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: vigil
    main: ./cmd/vigil
    binary: vigil
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: vigil
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  footer: |
    ---
    Imagen Docker: `ghcr.io/bc0d3/vigil:{{ .Tag }}`
